services:
  backend:
    build:
      context: ./backend-js
      dockerfile: Dockerfile
    container_name: monos-backend
    ports:
      - "8000:8000"
    volumes:
      - ../notes:/app/notes
      - ../assets:/app/assets
      - ./.data:/app/.data
    environment:
      - NODE_ENV=production
      - NOTES_ROOT=/app
    networks:
      - monos
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: monos-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - monos

networks:
  monos:
    driver: bridge
