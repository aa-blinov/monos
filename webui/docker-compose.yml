services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: monos-backend
    ports:
      - "8000:8000"
    volumes:
      - ../notes:/app/notes
      - ../assets:/app/assets
      - ./.data:/app/data
      - ./backend:/app/backend
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - monos
    healthcheck:
      test: ["CMD-SHELL", "python -m urllib.request || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: monos-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - monos

networks:
  monos:
    driver: bridge
