name: Desktop Builds

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webui/backend/package-lock.json
            webui/frontend/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: webui/backend
      - run: npm ci
        working-directory: webui/frontend
      - run: npm run check:backend
      - run: npm run test:backend
      - run: npm run check:frontend
      - run: npm --prefix webui/frontend exec playwright install --with-deps chromium
      - run: npm run test:scale

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifact: monos-windows
            paths: |
              release/*.exe
          - os: macos-15
            script: dist:mac:arm64
            artifact: monos-macos-arm64
            paths: |
              release/*.dmg
          - os: macos-15-intel
            script: dist:mac:x64
            artifact: monos-macos-x64
            paths: |
              release/*.dmg
          - os: ubuntu-latest
            script: dist:linux
            artifact: monos-linux
            paths: |
              release/*.AppImage
              release/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            webui/backend/package-lock.json
            webui/frontend/package-lock.json
      - run: npm ci
      - run: npm ci
        working-directory: webui/frontend
      - run: npm run ${{ matrix.script }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Monos ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-artifacts/*.exe
            release-artifacts/*.dmg
            release-artifacts/*.AppImage
            release-artifacts/*.deb
